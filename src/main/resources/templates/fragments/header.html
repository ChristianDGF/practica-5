<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Mockup Server - PUCMM</title>
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Mocky Clone</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/manage/projects}">Proyectos</a></li>
<li class="nav-item"><a class="nav-link" th:href="@{/manage/mocks}">Mocks</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    
                    <a class="btn btn-sm btn-outline-light me-2" th:href="@{/(lang=es)}">ES</a>
                    <a class="btn btn-sm btn-outline-light me-2" th:href="@{/(lang=en)}">EN</a>
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-danger btn-sm" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
