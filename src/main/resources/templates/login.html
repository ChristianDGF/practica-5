<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Mocky Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-form { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <main class="login-form">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="h3 mb-3 fw-normal text-center">Iniciar Sesión</h1>
                
                <div th:if="${param.error}" class="alert alert-danger">
                    Usuario o contraseña incorrectos.
                </div>
                
                <div th:if="${param.logout}" class="alert alert-info">
                    Has cerrado sesión exitosamente.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" name="username" class="form-control" id="u" placeholder="Usuario" required>
                        <label for="u">Usuario</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" name="password" class="form-control" id="p" placeholder="Contraseña" required>
                        <label for="p">Contraseña</label>
                    </div>

                    <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
                    <hr class="my-4">
                    <p class="text-center">¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
                </main>
            </div>
        </div>
    </main>
</body>
</html>
