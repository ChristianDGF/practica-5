services:
  # 1. Base de Datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql_docker
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mocky_db
      MYSQL_USER: user_admin
      MYSQL_PASSWORD: user_password
    ports:
      - "33006:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Servidor Redis (IMDG para las sesiones)
  redis-server:
    image: redis:alpine
    container_name: redis_session
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Instancia App-1
  app-1:
    build: .
    container_name: instancia_app_1
    # Formato de diccionario (Clave: Valor) para que la fusión YAML funcione correctamente
    environment: &app_env
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql-db:3306/mocky_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USER: user_admin
      DB_PASSWORD: user_password
      DB_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATA_REDIS_HOST: redis-server
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SESSION_STORE_TYPE: redis
    ports:
      - "8080:8080"
    # Anclamos las dependencias para asegurar que las 3 apps esperen el healthcheck
    depends_on: &app_depends
      mysql-db:
        condition: service_healthy
      redis-server:
        condition: service_started

  # 4. Instancia App-2
  app-2:
    build: .
    container_name: instancia_app_2
    environment:
      <<: *app_env
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on: *app_depends

  # 5. Instancia App-3
  app-3:
    build: .
    container_name: instancia_app_3
    environment:
      <<: *app_env
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on: *app_depends

  # 6. Balanceador HAProxy
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy_load_balancer
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./haproxy:/etc/mi_haproxy:ro
      - ./certs:/etc/ssl/certs:ro
    command: ["haproxy", "-f", "/etc/mi_haproxy/haproxy.cfg"]
    depends_on:
      - app-1
      - app-2
      - app-3
    restart: unless-stopped

# Volumen persistente para la base de datos
volumes:
  mysql_data: