global
    maxconn 2000
    ssl-default-bind-options no-sslv3

defaults
    mode http
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend http_in
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

frontend https_in
    bind *:443 ssl crt /etc/ssl/certs/misitio.pem
    default_backend spring_apps

backend spring_apps
    balance roundrobin
    http-request add-header X-Forwarded-Proto https
    server instancia1 app-1:8080 check
    server instancia2 app-2:8081 check
    server instancia3 app-3:8082 check

